name: CV Pipeline

on:
  workflow_dispatch:
    inputs:
      job_description:
        description: "Full job description text (optional). Leave empty for generic CV."
        required: false
        type: string
      person_id:
        description: "Person bundle id under agents/cv/people/"
        required: true
        default: toni
        type: string
      language:
        description: "Output language"
        required: true
        default: de
        type: choice
        options:
          - de
          - en
      include_project_history:
        description: "Generate project history attachment"
        required: true
        default: false
        type: boolean
      include_cover_letter:
        description: "Generate source-bound cover letter"
        required: true
        default: false
        type: boolean
      include_interview_prep:
        description: "Generate interview prep notes"
        required: true
        default: false
        type: boolean
      include_style_guide:
        description: "Generate interview style guide"
        required: true
        default: false
        type: boolean
      include_learning_path:
        description: "Generate learning path guidance"
        required: true
        default: false
        type: boolean
      variant:
        description: "CV variant (optional)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - security_appsec
          - ai_security_automation
      layout:
        description: "CV layout"
        required: true
        default: reference
        type: choice
        options:
          - reference
          - legacy_modern

permissions:
  contents: read

jobs:
  generate-cv:
    runs-on: ubuntu-latest
    env:
      CV_LLM_API_KEY: ${{ secrets.CV_LLM_API_KEY }}
      CV_LLM_MODEL: ${{ vars.CV_LLM_MODEL }}
      CV_LLM_BASE_URL: ${{ vars.CV_LLM_BASE_URL }}
      JOB_DESCRIPTION: ${{ inputs.job_description }}
      PERSON_ID: ${{ inputs.person_id }}
      LANGUAGE: ${{ inputs.language }}
      INCLUDE_PROJECT_HISTORY: ${{ inputs.include_project_history }}
      INCLUDE_COVER_LETTER: ${{ inputs.include_cover_letter }}
      INCLUDE_INTERVIEW_PREP: ${{ inputs.include_interview_prep }}
      INCLUDE_STYLE_GUIDE: ${{ inputs.include_style_guide }}
      INCLUDE_LEARNING_PATH: ${{ inputs.include_learning_path }}
      VARIANT: ${{ inputs.variant }}
      LAYOUT: ${{ inputs.layout }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-latex-extra \
            texlive-latex-recommended \
            fonts-lato \
            fontconfig

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/cv/requirements-ci.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run CV pipeline
        run: |
          cmd=(python3 -m agents.cv.run --base-dir "$GITHUB_WORKSPACE/agents/cv" --person "$PERSON_ID" --layout "$LAYOUT" --language "$LANGUAGE")
          if [[ -n "$VARIANT" ]]; then
            cmd+=(--variant "$VARIANT")
          fi
          if [[ "$INCLUDE_PROJECT_HISTORY" == "true" ]]; then
            cmd+=(--project-history)
          fi
          if [[ "$INCLUDE_COVER_LETTER" == "true" ]]; then
            cmd+=(--cover-letter)
          fi
          if [[ "$INCLUDE_INTERVIEW_PREP" == "true" ]]; then
            cmd+=(--interview-prep)
          fi
          if [[ "$INCLUDE_STYLE_GUIDE" == "true" ]]; then
            cmd+=(--style-guide)
          fi
          if [[ "$INCLUDE_LEARNING_PATH" == "true" ]]; then
            cmd+=(--learning-path)
          fi
          if [[ -n "$JOB_DESCRIPTION" ]]; then
            cmd+=(--job-text "$JOB_DESCRIPTION")
          fi
          printf 'Running command: %q ' "${cmd[@]}"
          echo
          "${cmd[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-artifacts
          path: |
            agents/cv/result/${{ inputs.person_id }}/**
          if-no-files-found: warn
